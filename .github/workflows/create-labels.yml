name: Create labels

on:
  workflow_run:
    workflows: ["Sync Files"]
    types:
      - completed

jobs:
  labeler:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      -
        name: Check if labels.yml changed
        id: check_labels
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '.github/labels.yml'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      -
        name: Run Labeler
        if: steps.check_labels.outputs.changed == 'true'
        uses: crazy-max/ghaction-github-labeler@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          yaml-file: .github/labels.yml
          skip-delete: false
          dry-run: false
          exclude: |
            help*
            *issue
