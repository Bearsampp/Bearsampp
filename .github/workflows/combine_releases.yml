name: Quickpick Combine Releases

on:
  # Run on pushes to main branch in the main repository
  push:
    branches:
      - main
  
  # Run on release events in the main repository
  release:
    types: [published, edited, prereleased]
  
  # Run when manually triggered
  workflow_dispatch:
  
  # Run when triggered by module repositories
  repository_dispatch:
    types: [module_release_created]
  
  # Run monthly to catch any missed updates
  schedule:
    # Run on the 1st day of each month at midnight
    - cron: '0 0 1 * *'

permissions:
  pull-requests: write
  contents: write

jobs:
  combine-releases:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper comparisons

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests packaging

      - name: Combine releases into JSON
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python .github/combine_releases.py

      - name: Verify quickpick-releases.json was created
        run: |
          if [ -f core/resources/quickpick-releases.json ]; then
            echo "✓ File created successfully"
            ls -lh core/resources/quickpick-releases.json
          else
            echo "✗ File was not created!"
            exit 1
          fi

      - name: Check for changes
        id: git-check
        run: |
          git status
          if [[ -n $(git status -s) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add core/resources/quickpick-releases.json
          git commit -m "Update combined releases JSON"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
